server:
  port: 8081
spring:
  application:
    name: huixiang
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 254933
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
      database: 6
  jackson:
    default-property-inclusion: non_null
  rabbitmq:
    host: 127.0.0.1
    username: haopengmai
    password: 123456
    virtual-host: /
    port: 5672
    listener:
      simple:
        concurrency: 10
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        # 消费失败不重入队，转入死信队列
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 1
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 1

mybatis-plus:
  type-aliases-package: com.hmdp.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.hmdp: debug

# Actuator 健康检查：禁用邮件健康检查（项目用阿里云短信，不使用 Spring JavaMailSender）
management:
  health:
    mail:
      enabled: false

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: 速通互联验证码
    template-code: 100001
    region-id: cn-hangzhou
    dev-mode: true
    dev-fixed-code: 123456

# LangChain4j - DeepSeek (OpenAI 兼容接口)
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
      log-requests: true
      log-responses: false

# 惠享生活业务配置
huixiang:
  pay:
    mock: true          # 模拟支付（个人用户无法接入真实微信支付）
  order:
    timeout-minutes: 15 # 订单超时自动关闭时间
  ai:
    memory-ttl-minutes: 30  # 会话记忆 TTL
  upload:
    image-dir: ./nginx-1.18.0/html/hmdp/imgs  # 图片上传目录（相对工作目录）
